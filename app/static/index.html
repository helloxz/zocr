<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOCR - OCR Recognition Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        primaryDark: '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        .drop-zone-active {
            border-color: #2563eb !important;
            background-color: #eff6ff !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 text-white shadow-lg">
        <div class="max-w-3xl mx-auto px-4 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-lg">Z</div>
                <h1 class="text-xl font-bold tracking-tight">ZOCR</h1>
            </div>
            <a href="https://github.com/helloxz/zocr" target="_blank" rel="noopener noreferrer"
               class="flex items-center gap-2 text-gray-300 hover:text-white transition-colors text-sm">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                <span class="hidden sm:inline">GitHub</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">

        <!-- Description -->
        <p class="text-gray-500 text-sm mb-6 text-center">OCR recognition service powered by PP-OCRv6. Upload an image to extract text.</p>

        <!-- Token Input -->
        <div class="mb-5">
            <label for="token" class="block text-sm font-medium text-gray-700 mb-1.5">API Token</label>
            <div class="relative">
                <input type="password" id="token" placeholder="Enter your token"
                       class="w-full px-4 py-2.5 pr-9 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-sm bg-white">
                <button id="clearToken" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
            </div>
        </div>

        <!-- Drop Zone -->
        <div id="dropZone"
             class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer transition-all hover:border-primary hover:bg-blue-50/50 mb-5">
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/bmp,image/webp" class="hidden">
            <div id="dropHint">
                <svg class="mx-auto w-10 h-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <p class="text-gray-500 text-sm"><span class="text-primary font-medium">Click to upload</span>, drag & drop, or paste</p>
                <p class="text-gray-400 text-xs mt-1">JPG, PNG, BMP, WebP &middot; Max 10MB &middot; Ctrl+V / Cmd+V</p>
            </div>
            <div id="fileInfo" class="hidden">
                <div class="flex items-center justify-center gap-3">
                    <img id="preview" class="w-20 h-20 object-cover rounded-lg border" src="" alt="">
                    <div class="text-left">
                        <p id="fileName" class="text-sm font-medium text-gray-700 truncate max-w-[200px]"></p>
                        <p id="fileSize" class="text-xs text-gray-400 mt-0.5"></p>
                        <button id="clearBtn" class="text-xs text-red-500 hover:text-red-700 mt-1 transition-colors">Remove</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <button id="submitBtn" disabled
                class="w-full py-2.5 bg-primary text-white rounded-lg font-medium text-sm hover:bg-primaryDark disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
            <svg id="btnIcon" class="w-4 h-4 hidden animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span id="btnText">Recognize</span>
        </button>

        <!-- Result Area -->
        <div id="resultArea" class="hidden mt-6 fade-in">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-semibold text-gray-700">Recognition Result</h3>
                <button id="copyBtn" class="text-xs text-primary hover:text-primaryDark transition-colors flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                    Copy
                </button>
            </div>
            <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                <!-- Full Text -->
                <div id="fullText" class="p-4 text-sm text-gray-800 whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto"></div>
                <!-- Stats -->
                <div class="border-t border-gray-100 px-4 py-2.5 bg-gray-50/50 flex items-center gap-4 text-xs text-gray-400">
                    <span id="textCount"></span>
                    <span id="avgScore"></span>
                </div>
            </div>
            <!-- Detail Toggle -->
            <details id="detailSection" class="mt-3">
                <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-600 transition-colors">Show details</summary>
                <div id="detailBody" class="mt-2 space-y-2"></div>
            </details>
        </div>

        <!-- Error Area -->
        <div id="errorArea" class="hidden mt-6 fade-in">
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-3">
                <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p id="errorMsg" class="text-sm text-red-700"></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-gray-400">
        <a href="https://github.com/helloxz/zocr" target="_blank" rel="noopener noreferrer"
           class="hover:text-gray-600 transition-colors">ZOCR</a>
        &middot; Powered by PP-OCRv6
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropHint = document.getElementById('dropHint');
        const fileInfo = document.getElementById('fileInfo');
        const preview = document.getElementById('preview');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const clearBtn = document.getElementById('clearBtn');
        const submitBtn = document.getElementById('submitBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const fullText = document.getElementById('fullText');
        const textCount = document.getElementById('textCount');
        const avgScore = document.getElementById('avgScore');
        const detailBody = document.getElementById('detailBody');
        const detailSection = document.getElementById('detailSection');
        const errorArea = document.getElementById('errorArea');
        const errorMsg = document.getElementById('errorMsg');
        const copyBtn = document.getElementById('copyBtn');
        const clearToken = document.getElementById('clearToken');

        let selectedFile = null;

        // 从localStorage读取token
        const savedToken = localStorage.getItem('zocr_token');
        if (savedToken) {
            document.getElementById('token').value = savedToken;
            clearToken.classList.remove('hidden');
        }

        // Token输入事件 - 控制清除按钮显隐
        document.getElementById('token').addEventListener('input', (e) => {
            if (e.target.value) {
                clearToken.classList.remove('hidden');
            } else {
                clearToken.classList.add('hidden');
            }
        });

        // Token失去焦点 - 保存到localStorage
        document.getElementById('token').addEventListener('blur', (e) => {
            const val = e.target.value.trim();
            if (val) {
                localStorage.setItem('zocr_token', val);
            }
        });

        // 清除Token按钮
        clearToken.addEventListener('click', () => {
            const tokenInput = document.getElementById('token');
            tokenInput.value = '';
            localStorage.removeItem('zocr_token');
            clearToken.classList.add('hidden');
            tokenInput.focus();
        });

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // Drag events
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone-active'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drop-zone-active'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone-active');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        // Paste event - Ctrl+V / Cmd+V
        document.addEventListener('paste', (e) => {
            const files = e.clipboardData?.files;
            if (files && files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
            }
        });

        // Handle selected file
        function handleFile(file) {
            const allowed = ['image/jpeg', 'image/png', 'image/bmp', 'image/webp'];
            if (!allowed.includes(file.type)) {
                showError('Unsupported format. Please upload JPG, PNG, BMP, or WebP.');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showError('File too large. Maximum size is 10MB.');
                return;
            }
            selectedFile = file;
            hideError();
            hideResult();

            const url = URL.createObjectURL(file);
            preview.src = url;
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);

            dropHint.classList.add('hidden');
            fileInfo.classList.remove('hidden');
            submitBtn.disabled = false;
        }

        // Clear file
        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetFile();
        });

        function resetFile() {
            selectedFile = null;
            fileInput.value = '';
            dropHint.classList.remove('hidden');
            fileInfo.classList.add('hidden');
            submitBtn.disabled = true;
            hideResult();
            hideError();
        }

        // Submit
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const token = document.getElementById('token').value.trim();

            setLoading(true);
            hideResult();
            hideError();

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const headers = {};
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const resp = await fetch('/api/ocr/upload', { method: 'POST', headers, body: formData });
                const data = await resp.json();

                if (data.code === 200) {
                    showResult(data.data);
                } else {
                    showError(data.msg || 'Recognition failed.');
                }
            } catch (err) {
                showError('Network error. Please check your connection and try again.');
            } finally {
                setLoading(false);
            }
        });

        // Copy result
        copyBtn.addEventListener('click', () => {
            const text = fullText.textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.innerHTML = `
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Copied!`;
                setTimeout(() => {
                    copyBtn.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        Copy`;
                }, 1500);
            });
        });

        function showResult(data) {
            fullText.textContent = data.full_text || '';
            textCount.textContent = `${data.texts.length} text region(s)`;

            if (data.scores && data.scores.length) {
                const avg = (data.scores.reduce((a, b) => a + b, 0) / data.scores.length * 100).toFixed(1);
                avgScore.textContent = `Avg confidence: ${avg}%`;
            } else {
                avgScore.textContent = '';
            }

            // Details
            detailBody.innerHTML = '';
            if (data.texts && data.texts.length > 1) {
                data.texts.forEach((text, i) => {
                    const score = data.scores[i] !== undefined ? (data.scores[i] * 100).toFixed(1) : '-';
                    const div = document.createElement('div');
                    div.className = 'bg-white border border-gray-200 rounded-lg p-3 text-sm';
                    div.innerHTML = `
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs text-gray-400">#${i + 1}</span>
                            <span class="text-xs font-medium ${parseFloat(score) >= 90 ? 'text-green-500' : parseFloat(score) >= 70 ? 'text-yellow-500' : 'text-red-500'}">${score}%</span>
                        </div>
                        <p class="text-gray-700 break-words">${escapeHtml(text)}</p>`;
                    detailBody.appendChild(div);
                });
                detailSection.classList.remove('hidden');
            } else {
                detailSection.classList.add('hidden');
            }

            resultArea.classList.remove('hidden');
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorArea.classList.remove('hidden');
        }

        function hideResult() { resultArea.classList.add('hidden'); }
        function hideError() { errorArea.classList.add('hidden'); }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            if (loading) {
                btnIcon.classList.remove('hidden');
                btnText.textContent = 'Recognizing...';
            } else {
                btnIcon.classList.add('hidden');
                btnText.textContent = 'Recognize';
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
